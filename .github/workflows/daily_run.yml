name: Daily Thermo-Bottleneck Analysis

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run thermo-bottleneck
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python trainer.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: thermo-bottleneck-results
          path: results/
